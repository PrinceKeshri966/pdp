    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ── Auth & API helpers ────────────────────────────────────────────────────
        let _clerk = null;
        let _authProvider = 'none';

        function parseJwtPayload(token) {
            try {
                const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(atob(base64));
            } catch (_) { return null; }
        }

        function getAuthToken() {
            return sessionStorage.getItem('auth_token');
        }

        const AUTH_ERROR_MESSAGES = {
            invalid_state: 'Login session expired. Click Continue with Google again.',
            token_exchange_failed: 'Could not verify with Google. Check your Client Secret in .env.',
            userinfo_failed: 'Could not load your Google profile. Try again.',
            missing_code: 'Google did not return a login code. Try again.',
            access_denied: 'You cancelled Google sign-in.',
        };

        function getAuthErrorMessage(code) {
            return AUTH_ERROR_MESSAGES[code] || 'Sign-in failed. Please try again.';
        }

        function buildAuthUser(jwtPayload, profile) {
            const name = (profile && profile.name) || jwtPayload?.name || '';
            const email = (profile && profile.email) || jwtPayload?.email || '';
            const picture = (profile && profile.picture) || jwtPayload?.picture || null;
            return {
                email,
                fullName: name,
                firstName: name.split(' ')[0] || name,
                lastName: name.split(' ').slice(1).join(' '),
                picture,
                primaryEmailAddress: { emailAddress: email },
            };
        }

        async function loadGoogleAuthUser(token) {
            const p = parseJwtPayload(token);
            if (!p?.sub) return null;
            try {
                const resp = await fetch('/api/v1/auth/me', {
                    headers: { Authorization: `Bearer ${token}` },
                });
                if (resp.ok) {
                    const me = await resp.json();
                    return buildAuthUser(p, me);
                }
            } catch (_) {}
            return buildAuthUser(p, null);
        }

        function signOutAuth() {
            sessionStorage.removeItem('auth_token');
            if (_clerk) {
                _clerk.signOut(() => window.location.reload());
            } else {
                window.location.reload();
            }
        }

        async function apiFetch(path, options = {}) {
            // Allow FormData body to be sent without forcing JSON content-type
            const isForm = options && options.body && (options.body instanceof FormData);
            const headers = isForm ? { ...(options.headers || {}) } : { 'Content-Type': 'application/json', ...(options.headers || {}) };
            const stored = getAuthToken();
            if (stored) {
                headers['Authorization'] = `Bearer ${stored}`;
            } else if (_clerk?.session) {
                try {
                    const token = await _clerk.session.getToken();
                    if (token) headers['Authorization'] = `Bearer ${token}`;
                } catch (_) {}
            }
            const fetchOptions = { ...options, headers };
            // If body is an object and not already a string or FormData, stringify it for JSON
            if (!isForm && fetchOptions.body && typeof fetchOptions.body !== 'string') {
                fetchOptions.body = JSON.stringify(fetchOptions.body);
            }
            const resp = await fetch(path, fetchOptions);
            if (!resp.ok) {
                let detail = `HTTP ${resp.status}`;
                try { detail = (await resp.json()).detail || detail; } catch (_) {}
                throw new Error(detail);
            }
            return resp.json();
        }

        async function apiStreamAnalyze(path, body, onProgress) {
            const headers = { 'Content-Type': 'application/json', Accept: 'text/event-stream' };
            const stored = getAuthToken();
            if (stored) {
                headers['Authorization'] = `Bearer ${stored}`;
            } else if (_clerk?.session) {
                try {
                    const token = await _clerk.session.getToken();
                    if (token) headers['Authorization'] = `Bearer ${token}`;
                } catch (_) {}
            }
            const resp = await fetch(path, {
                method: 'POST',
                headers,
                body: JSON.stringify(body),
                credentials: 'include',
            });
            if (!resp.ok) {
                let detail = `HTTP ${resp.status}`;
                try { detail = (await resp.json()).detail || detail; } catch (_) {}
                throw new Error(detail);
            }
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n\n');
                buffer = parts.pop() || '';
                for (const part of parts) {
                    const line = part.split('\n').find(l => l.startsWith('data: '));
                    if (!line) continue;
                    const data = JSON.parse(line.slice(6));
                    if (data.type === 'progress' && onProgress) onProgress(data);
                    if (data.type === 'error') throw new Error(data.detail || 'Analysis failed');
                    if (data.type === 'done') return data.result;
                }
            }
            throw new Error('Stream ended before analysis completed');
        }

        function buildMode2BusinessInput(chatHistory) {
            const userText = chatHistory.filter(m => m.role === 'user').map(m => m.text).join('\n\n');
            const systemCtx = chatHistory.filter(m => m.role === 'system').map(m => m.text).join('\n\n');
            if (!userText.trim()) return '';
            return systemCtx.trim()
                ? `${userText}\n\nAdditional context:\n${systemCtx}`
                : userText;
        }

        async function runMode2FromChat(chatHistory, setters) {
            const { setView, setAnalyzingText, setAnalyzingProgress, setMode2Result, showToast, setViewOnFail } = setters;
            const business_input = buildMode2BusinessInput(chatHistory);
            if (!business_input.trim()) {
                showToast('Please describe your business in the chat first.');
                return;
            }
            setView('RESEARCHING');
            setAnalyzingProgress({ completed: 0, total: 3 });
            setAnalyzingText('Business Agent: Parsing your market...');
            try {
                const result = await apiStreamAnalyze(
                    '/api/v1/analyze/business/stream',
                    { business_input },
                    (evt) => {
                        if (evt.label) setAnalyzingText(evt.label);
                        if (evt.completed_count != null) {
                            setAnalyzingProgress({ completed: evt.completed_count, total: evt.total_count || 3 });
                        }
                    }
                );
                setMode2Result(result);
                setView('SELECT_LAYOUT');
                if (setters.onComplete) setters.onComplete();
            } catch (err) {
                showToast(`Research failed: ${err.message}`);
                setView(setViewOnFail || 'MODE2_INPUT');
            }
        }

        function getCategoryImages(understanding, chatHistory) {
            return buildPromptImages(understanding, chatHistory);
        }

        function buildImagePrompt(understanding, chatHistory) {
            const parts = [
                understanding?.product_name,
                understanding?.sub_category,
                understanding?.product_category,
                ...(understanding?.key_features || []).slice(0, 2),
                ...(chatHistory || []).filter(m => m.role === 'user').map(m => m.text),
            ].filter(Boolean).join(' ');
            const text = parts.toLowerCase();
            if (/saree|ethnic|banarasi|silk|lehenga|kurta|indian/.test(text)) {
                return 'ethnic indian saree product photography studio lighting ecommerce';
            }
            if (/fitness|gym|fitpass|workout/.test(text)) {
                return 'fitness gym membership product photography professional';
            }
            if (/skincare|beauty|cosmetic|mamaearth/.test(text)) {
                return 'natural skincare beauty product photography clean white background';
            }
            if (/jeans|denim/.test(text)) {
                return 'denim jeans fashion product photography model';
            }
            const fallback = understanding?.product_category || understanding?.product_name || 'ecommerce product';
            return `${fallback} professional product photography ecommerce white background`;
        }

        function buildPromptImages(understanding, chatHistory) {
            const prompt = encodeURIComponent(buildImagePrompt(understanding, chatHistory));
            const angles = ['front view', 'side angle', 'detail closeup', 'lifestyle model wearing'];

        }

        }

        function sitePreviewUrl(url) {
            if (!url || url.includes('google.com/search')) return null;
            return `https://image.thum.io/get/width/480/crop/480/noanimate/${url}`;
        }

        function extractDomain(url) {
            try {
                return new URL(url.startsWith('http') ? url : `https://${url}`).hostname.replace(/^www\./, '');
            } catch {
                return url || 'website';
            }
        }

        function faviconUrl(url) {
            const domain = extractDomain(url);
            return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
        }

        function formatRelativeTime(iso) {
            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return `${mins} min ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs} hour${hrs > 1 ? 's' : ''} ago`;
            const days = Math.floor(hrs / 24);
            if (days < 7) return `${days} day${days > 1 ? 's' : ''} ago`;
            return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function isLikelyHomepageUrl(url) {
            try {
                const u = new URL(url.startsWith('http') ? url : `https://${url}`);
                const path = u.pathname.replace(/\/+$/, '') || '/';
                if (path === '/') return true;
                const segments = path.split('/').filter(Boolean);
                return segments.length === 1 && !/product|pdp|item|sku|dp\//i.test(path);
            } catch {
                return false;
            }
        }

        function healthScoreDisplay(report) {
            const raw = report?.overall_health_score ?? report?.overall_score ?? report?.seo_score;

            return Math.round(Number(raw) * 10);

        function healthScoreColor(score) {
            if (score == null) return 'text-slate-400 bg-slate-100';
            if (score < 40) return 'text-red-700 bg-red-50 border-red-100';
            if (score < 70) return 'text-amber-700 bg-amber-50 border-amber-100';
            return 'text-emerald-700 bg-emerald-50 border-emerald-100';

        function statusBadge(status) {
            const s = (status || 'pending').toLowerCase();

        // ── Sign-in / Sign-up (Google OAuth or Clerk) ───────────────────────────

                    showToast(`History load failed: ${e.message}`);
                } finally {
                    setHistoryLoading(false);
                }
            };

            useEffect(() => {
                if (view === 'HISTORY') loadHistory();
            }, [view]);

            const openHistoryReport = async (id) => {
                setHistoryOpening(id);
                try {
                    const data = await apiFetch(`/api/v1/reports/analysis/${id}`);
                    setMode1Result(data);
                    setUrlInput(data.source_url || '');
                    setReportTab('WEBSITE');
                    setView('REPORT_MODE1');
                } catch (e) {
                    showToast(`Could not load report: ${e.message}`);
                } finally {
                    setHistoryOpening(null);
                }
            };

            const openHistoryBlueprint = async (id) => {
                setHistoryOpening(id);
                try {
                    const data = await apiFetch(`/api/v1/reports/blueprint/${id}`);
                    setMode2Result(data);
                    if (data.business_input) {
                        setChatHistory([
                            { role: 'user', text: data.business_input },
                            { role: 'ai', text: 'I have generated the initial high-converting layout based on your business brief. How would you like to refine it?' },
                        ]);
                    }
                    setView('SELECT_LAYOUT');
                } catch (e) {
                    showToast(`Could not load blueprint: ${e.message}`);
                } finally {
                    setHistoryOpening(null);
                }
            };

            useEffect(() => {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [chatHistory]);

            useEffect(() => {
                if (skipNavUpdate.current) {
                    skipNavUpdate.current = false;
                    return;
                }
                setNavStack(prev => {
                    if (prev[navIdx] === view) return prev;
                    const next = [...prev.slice(0, navIdx + 1), view];
                    setNavIdx(next.length - 1);
                    return next;
                });
            }, [view]);

            const goNavBack = () => {
                if (navIdx <= 0) return;
                skipNavUpdate.current = true;
                const ni = navIdx - 1;
                setNavIdx(ni);
                setView(navStack[ni]);
            };
            const goNavForward = () => {
                if (navIdx >= navStack.length - 1) return;
                skipNavUpdate.current = true;
                const ni = navIdx + 1;
                setNavIdx(ni);
                setView(navStack[ni]);
            };

            const isMode2View = ['MODE2_INPUT', 'RESEARCHING', 'SELECT_LAYOUT', 'VISUALIZER_MODE2'].includes(view);
            const isHomeNav = ['HOME', 'MODE1_INPUT', 'MODE2_INPUT', 'ANALYZING', 'RESEARCHING'].includes(view);
            const agentBadgeCount = isMode2View ? 3 : 10;

            // ── Mode 1: call POST /api/v1/analyze/pdp ────────────────────────────
            const runMode1Analysis = async () => {
                if (!urlInput.trim()) return;
                if (isLikelyHomepageUrl(urlInput)) {
                    showToast('Tip: Use a product page URL (with /products/...) for best PDP audit results.');
                }
                setView('ANALYZING');
                setAnalyzingProgress({ completed: 0, total: 10 });
                setAnalyzingText('Scraper Agent: Fetching page...');
                try {
                    const result = await apiStreamAnalyze(
                        '/api/v1/analyze/pdp/stream',
                        { url: urlInput },
                        (evt) => {
                            if (evt.label) setAnalyzingText(evt.label);
                            if (evt.completed_count != null) {
                                setAnalyzingProgress({ completed: evt.completed_count, total: evt.total_count || 10 });
                            }
                        }
                    );
                    setMode1Result(result);
                    setReportTab('WEBSITE');
                    setView('REPORT_MODE1');
                    loadHistory();
                } catch (err) {
                    showToast(`Analysis failed: ${err.message}`);
                    setView('MODE1_INPUT');
                }
            };

            // ── Mode 2: legacy form flow (if used) ───────────────────────────────
            const runMode2Analysis = async () => {
                const business_input = `Product: ${businessData.product}\nTarget Audience: ${businessData.audience}\nTarget Region: ${businessData.region}\nMaterial / USP: ${businessData.material}`;
                if (!businessData.product.trim()) {
                    showToast('Please fill in your business details.');
                    return;
                }
                setView('RESEARCHING');
                setAnalyzingProgress({ completed: 0, total: 3 });
                setAnalyzingText('Business Agent: Parsing your market...');
                try {
                    const result = await apiStreamAnalyze(
                        '/api/v1/analyze/business/stream',
                        { business_input },
                        (evt) => {
                            if (evt.label) setAnalyzingText(evt.label);
                            if (evt.completed_count != null) {
                                setAnalyzingProgress({ completed: evt.completed_count, total: evt.total_count || 3 });
                            }
                        }
                    );
                    setMode2Result(result);
                    setView('SELECT_LAYOUT');
                } catch (err) {
                    showToast(`Research failed: ${err.message}`);
                    setView('MODE2_INPUT');
                }
            };

            // ── Copilot chat (mock — no refinement endpoint yet) ─────────────────
            const handleRefineDesign = () => {
                if (!chatInput.trim()) return;
                const userText = chatInput.trim();
                setChatHistory(h => [...h, { role: 'user', text: userText }]);
                setChatInput('');
                setIsUpdating(true);
                setTimeout(() => {
                    const t = userText.toLowerCase();
                    let reply = 'Updated the page preview with your feedback.';
                    if (/green|blue|red|maroon|gold|purple/.test(t) && /color|colour|saree|product/.test(t)) {
                        const color = t.match(/green|blue|red|maroon|gold|purple/)?.[0] || 'green';
                        setPageEdits(e => ({ ...e, accentColor: color }));
                        reply = `Done — updated the product accent to ${color}. Check the preview on the left.`;
                    } else if (/review|rating|star/.test(t)) {
                        setPageEdits(e => ({
                            ...e,
                            reviewCount: (e.reviewCount || 128) + 42,
                            rating: 4.9,
                            reviewSnippet: userText.includes(':') ? userText.split(':').slice(1).join(':').trim() : 'Beautiful quality and fast delivery!',
                        }));
                        reply = 'Added customer reviews to the product page preview.';
                    } else if (/faq|question/.test(t)) {
                        setPageEdits(e => ({
                            ...e,
                            extraFaq: { q: userText.replace(/^add\s+/i, ''), a: 'Yes — this product is crafted for your needs with premium quality and easy returns.' },
                        }));
                        reply = 'Added a new FAQ block based on your request.';
                    } else if (/price|discount|offer/.test(t)) {
                        setPageEdits(e => ({ ...e, showDiscount: true, priceNote: userText }));
                        reply = 'Updated pricing display on the preview.';
                    } else if (/sustainable|eco|organic/.test(t)) {
                        setPageEdits(e => ({ ...e, sustainabilityNote: userText }));
                        reply = 'Added a sustainability highlight to the page.';

                        setPageEdits(e => ({ ...e, customNote: userText }));

                    }
                    setPageVersion(v => v + 1);
                    setChatHistory(h => [...h, { role: 'ai', text: reply }]);
                    setIsUpdating(false);
                }, 600);
            };

            const handleSendMessage = async () => {
                if (!chatInput.trim()) return;
                const userText = chatInput.trim();
                setChatHistory(h => [...h, { role: 'user', text: userText }]);
                setChatInput('');
                setIsUpdating(true);
                try {
                    // Send current chat + new message to backend chat endpoint
                    const messages = (chatHistory || []).map(m => ({ role: m.role, text: m.text }));
                    messages.push({ role: 'user', text: userText });
                    const resp = await apiFetch('/api/v1/chat/message', { method: 'POST', body: { messages } });
                    // Accept either { messages: [...] } or { reply: '...' }
                    if (Array.isArray(resp.messages)) {
                        setChatHistory(h => [...h, ...resp.messages.map(m => ({ role: m.role || 'ai', text: m.text || m }))]);

            // Upload helper: sends FormData via apiFetch (apiFetch handles FormData)

            // ── Derive display values from real API responses ─────────────────────

            const mode1ProductCtx = buildProductContext(mode1ProductData, mode1Result, urlInput);

            const formatProductPrice = (pd) => {

                    return `${sym}${pd.price}`;

                if (pd?.above_fold_cta) return pd.above_fold_cta;
                return 'See website for pricing';
            };

            const personalizeGlossaryText = (text, ctx) => {
                if (!text || !ctx?.productName) return text;
                return text
                    .replace(/\{product_name\}/gi, ctx.productName)
                    .replace(/\{brand\}/gi, ctx.brand)
                    .replace(/\{category\}/gi, ctx.category)
                    .replace(/Killer Jeans/gi, ctx.brand)
                    .replace(/Men's Slim Fit Stretch Jeans — Dark Blue/gi, ctx.productName)
                    .replace(/Men's Slim Fit Blue Denim/gi, ctx.productName)
                    .replace(/Men's Slim Fit Jeans — Fabric & Fit/gi, `${ctx.productName} — Details & Features`)
                    .replace(/Shop premium jeans today — Free shipping on orders above ₹999\./gi,
                        `Shop ${ctx.productName} today${ctx.price ? ` — from ${ctx.price}` : ''}.`)
                    .replace(/men's jeans/gi, ctx.primaryKeyword)
                    .replace(/'jeans', 'denim'/gi, `'${ctx.primaryKeyword}'`)
                    .replace(/Will these jeans shrink after wash\?/gi, ctx.sampleFaq)
                    .replace(/Home > Men > Jeans/gi, ctx.breadcrumb)
                    .replace(/best jeans under ₹2000/gi, ctx.sampleQuery);
            };

            const getAgentFixForCheck = (checkId, result, ctx) => {
                if (!result) return null;
                const seo = result.seo_report || {};
                const aeo = result.aeo_report || {};
                const ux = result.ux_report || {};
                const fix = result.autofix_report || {};
                const direct = {
                    meta_has_cta: fix.fixed_meta_description,
                    kw_in_title: fix.fixed_title_tag,
                    kw_in_h1: fix.fixed_h1,
                    kw_in_meta: fix.fixed_meta_description,
                    schema_product: fix.schema_markup_snippet ? 'Open the AutoFix tab for Product schema code tailored to this page.' : null,
                    faq_schema: fix.schema_markup_snippet ? 'Open the AutoFix tab for FAQ schema code for this product.' : null,
                    aeo_llm_snippet: (aeo.recommendations || [])[0] || (aeo.quick_wins_for_ai || [])[0],
                    aeo_conversational: (aeo.quick_wins_for_ai || [])[0] || (aeo.recommendations || [])[0],
                    aeo_not_commodity: (aeo.recommendations || [])[1] || (aeo.gaps || [])[0],
                    aeo_unique_perspective: (aeo.recommendations || [])[0],
                    rag_citable: (aeo.rag_readiness?.issues || [])[0] || (aeo.recommendations || [])[0],
                    rag_uvp: (aeo.gaps || [])[0],
                    rag_factual: (aeo.recommendations || [])[0],
                    geo_perplexity: (aeo.geo_signals?.issues || [])[0] || (aeo.recommendations || [])[0],
                    geo_sge: (aeo.recommendations || [])[0],
                    geo_direct_answer: (aeo.quick_wins_for_ai || [])[0],
                };
                if (direct[checkId]) {
                    const val = direct[checkId];
                    if (typeof val === 'string' && val.length > 0) {
                        if (checkId === 'meta_has_cta' || checkId === 'kw_in_meta') {
                            return `Use this meta description for ${ctx.productName}: "${val.slice(0, 160)}${val.length > 160 ? '…' : ''}"`;
                        }
                        if (checkId === 'kw_in_title') return `Suggested title for ${ctx.productName}: "${val}"`;
                        if (checkId === 'kw_in_h1') return `Suggested main headline: "${val}"`;
                        return val;
                    }
                }
                const pool = [
                    ...(fix.priority_action_plan || []).map(a => a.action || a),
                    ...(seo.recommendations || []),
                    ...(seo.quick_wins || []),
                    ...(aeo.recommendations || []),
                    ...(aeo.quick_wins_for_ai || []),
                    ...(aeo.gaps || []),
                    ...(ux.recommendations || []),
                ].filter(Boolean);
                const tokens = checkId.split('_').filter(t => t.length > 2 && !['aeo', 'tech', 'geo', 'rag'].includes(t));
                return pool.find(item => {
                    const lower = String(item).toLowerCase();
                    return tokens.some(t => lower.includes(t.replace('kw', 'keyword')));
                }) || null;
            };

            const personalizeGlossaryEntry = (entry, checkId, passed) => {
                if (!entry) return {};
                const ctx = mode1ProductCtx;
                const agentFix = !passed ? getAgentFixForCheck(checkId, mode1Result, ctx) : null;
                return {
                    meaning: personalizeGlossaryText(entry.meaning, ctx),
                    ok: personalizeGlossaryText(entry.ok, ctx),
                    fail: personalizeGlossaryText(entry.fail, ctx),
                    fix: agentFix || personalizeGlossaryText(entry.fix, ctx),
                };

            const predictedBoost = autofixRpt.estimated_seo_score_improvement != null
                ? `+${Math.round(autofixRpt.estimated_seo_score_improvement * 10)} Pts`
                : '--';

            const actionItems = autofixRpt.priority_action_plan?.length > 0
                ? autofixRpt.priority_action_plan.slice(0, 3)
                : [];

            const codeBlocks = autofixRpt.schema_markup_snippet
                ? [
                    { filename: 'schema.jsonld (Auto-Fix Agent)', code: autofixRpt.schema_markup_snippet },
                    { filename: 'seo_fixes.html (SEO Agent)', code: `<title>${autofixRpt.fixed_title_tag || ''}</title>\n<meta name="description" content="${autofixRpt.fixed_meta_description || ''}">` }
                  ]
                : [];

            // ── Helpers: Plain-English transformations for Business View ─────────
            const toFriendlyTitle = (action) => {
                const a = (action || '').toLowerCase();
                if (a.includes('h1') && (a.includes('tag') || a.includes('add') || a.includes('headline'))) return 'Your page is missing a main headline';
                if (a.includes('meta description') || (a.includes('meta') && a.includes('desc'))) return 'No search result preview text';
                if (a.includes('schema') || a.includes('json-ld') || a.includes('structured data') || a.includes('rich snippet')) return "Google can't show your star ratings or FAQs";
                if (a.includes('h2') || a.includes('h3') || a.includes('heading hierarch') || a.includes('heading structure')) return 'Page sections are not organized';
                if (a.includes('internal link')) return 'No links between your products';
                if (a.includes('keyword') || a.includes('density')) return 'Product keywords are underused';
                if (a.includes('image') && (a.includes('alt') || a.includes('tag'))) return 'Product images have no descriptions';
                if (a.includes('title tag') || (a.includes('title') && a.includes('fix'))) return 'Browser tab title needs improvement';
                if (a.includes('cta') || a.includes('call-to-action')) return 'Buy buttons are not convincing enough';
                if (a.includes('page speed') || a.includes('core web')) return 'Page is loading too slowly';
                return action;
            };
            const toFriendlyExplanation = (action, impact) => {
                const a = (action || '').toLowerCase();
                if (a.includes('h1')) return "Every page needs one big main title — like a shop front sign. Right now your page has none, so Google and visitors don't know what they're looking at when they arrive.";
                if (a.includes('meta description')) return "When your page shows on Google, no preview text appears — customers see a blank snippet and skip your result. Write 1–2 sentences and people will click instead.";
                if (a.includes('schema') || a.includes('json-ld')) return "There's no behind-the-scenes code telling Google your product details. Competitors with this code show star ratings, prices and FAQs directly in search — yours doesn't.";
                if (a.includes('h2') || a.includes('heading')) return "Your page jumps from one block of text to another with no clear sections. Think of it like a book with no chapter titles — hard to read, hard for Google to organize.";
                if (a.includes('internal link')) return "Your page doesn't guide visitors to explore more products. Every extra link also helps Google discover and rank your pages faster.";
                if (a.includes('keyword')) return `Your main product words (like '${mode1ProductCtx.primaryKeyword}') don't appear often enough. Google uses these words to decide who sees your page.`;
                if (a.includes('image') && a.includes('alt')) return "Each product image needs a short text description. Blind users need it, and Google reads these descriptions to understand and rank your images in image search.";
                if (a.includes('title')) return "The title shown in browser tabs and Google results is too generic or long. A well-written title directly affects how many people click your search result.";
                return impact || 'This fix will improve how search engines and customers interact with your page.';
            };

            // ── Developer issues: combine SEO problems with code fixes ────────────
            const devIssues = [
                autofixRpt.fixed_h1 ? {
                    id: 'h1', severity: 'critical',
                    title: 'Missing H1 Headline Tag',
                    problem: 'No H1 tag found on the page. Place this at the very top of your page body, above all other text.',
                    filename: 'index.html  →  inside <body>',
                    code: `<h1>${autofixRpt.fixed_h1}</h1>`,
                } : null,
                autofixRpt.fixed_title_tag ? {
                    id: 'title', severity: 'high',
                    title: 'Optimized Page Title Tag',
                    problem: 'Current title is too long or missing keywords. Replace the existing <title> tag inside your HTML <head>.',
                    filename: 'index.html  →  inside <head>',
                    code: `<title>${autofixRpt.fixed_title_tag}</title>`,
                } : null,
                autofixRpt.fixed_meta_description ? {
                    id: 'meta', severity: 'high',
                    title: 'Add Meta Description Tag',
                    problem: 'No meta description detected. Paste this line inside your HTML <head> to control what Google shows in search results.',
                    filename: 'index.html  →  inside <head>',
                    code: `<meta name="description" content="${autofixRpt.fixed_meta_description}">`,
                } : null,
                autofixRpt.schema_markup_snippet ? {
                    id: 'schema', severity: 'high',
                    title: 'Add Schema.org Rich Snippets (JSON-LD)',
                    problem: 'No structured data found. Paste this entire block inside your <head>. It unlocks star ratings, FAQs and prices in Google Search.',
                    filename: 'index.html  →  inside <head>',
                    code: autofixRpt.schema_markup_snippet,
                } : null,
                autofixRpt.suggested_h2s?.length > 0 ? {
                    id: 'h2s', severity: 'medium',
                    title: 'Add H2 Section Headings',
                    problem: 'Page has no H2 subheadings. Add these to break up content into readable sections that also help SEO.',
                    filename: 'index.html  →  inside <body>',
                    code: autofixRpt.suggested_h2s.map(h => `<h2>${h}</h2>`).join('\n'),
                } : null,
                autofixRpt.rewritten_product_description ? {
                    id: 'desc', severity: 'medium',
                    title: 'Rewritten Product Description',
                    problem: 'Current description is generic. Replace the main product copy with this AI-optimized version.',
                    filename: 'product-description  →  body copy',
                    code: autofixRpt.rewritten_product_description,
                } : null,
            ].filter(Boolean);

            const blueprint      = mode2Result?.final_blueprint     || {};
            const understanding  = mode2Result?.business_understanding || {};
            const heroSection    = blueprint.page_sections?.find(s => s.order === 1) || blueprint.page_sections?.[0] || {};
            const productTitle   = pageEdits.title || blueprint.seo_blueprint?.h1 || heroSection.content?.headline || understanding.product_name || 'Your Product';
            const productDesc    = pageEdits.description || heroSection.content?.body_copy || blueprint.executive_summary || '';
            const ctaText        = heroSection.content?.cta || 'Add to Cart';
            const brandCategory  = understanding.sub_category || understanding.product_category || 'Product';
            const competitorPats = mode2Result?.pdp_research?.top_competitor_pdp_patterns || [];
            const categoryImages = buildPromptImages(understanding, chatHistory);
            const competitorSites = getCompetitorSites(understanding);
            const materialContent = findBlueprintSection(blueprint.page_sections, /material|care/i)?.content?.body_copy
                || (understanding.key_features || []).slice(0, 4).join('. ')
                || 'Premium quality materials. Follow care label instructions. Dry clean recommended for delicate fabrics.';
            const fitContent = findBlueprintSection(blueprint.page_sections, /fit|dimension|size/i)?.content?.body_copy
                || understanding.primary_audience?.demographics
                || 'Standard fit. Refer to the size guide for chest, waist, and length measurements.';
            const blueprintFaqs = (mode2Result?.pdp_research?.faq_recommendations || mode2Result?.pdp_research?.recommended_faqs || []).slice(0, 2);
            const accentStyle = pageEdits.accentColor ? { boxShadow: `0 0 0 3px ${pageEdits.accentColor}`, borderColor: pageEdits.accentColor } : {};

            // Sidebar user info
            const userName    = authUser?.fullName || authUser?.firstName || 'User';
            const userInitials = ((authUser?.firstName?.[0] || userName?.[0] || 'U') + (authUser?.lastName?.[0] || '')).toUpperCase().slice(0, 2) || 'U';
            const userEmail   = authUser?.primaryEmailAddress?.emailAddress || authUser?.email;
            const isLoggedIn  = Boolean(authUser);

            return (
                <div className="flex h-full w-full relative">
                    {/* TOAST */}

                    {checkDetail && (() => {
                        const rawEntry = checkGlossary[checkDetail.checkId] || {};
                        const passed = Boolean(checkDetail.val);
                        const entry = mode1Result
                            ? personalizeGlossaryEntry(rawEntry, checkDetail.checkId, passed)
                            : rawEntry;
                        return (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50" onClick={() => setCheckDetail(null)}>
                                <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                    <div className={`px-6 py-5 border-b flex items-start justify-between gap-4 ${passed ? 'bg-emerald-50 border-emerald-100' : 'bg-red-50 border-red-100'}`}>
                                        <div className="flex items-start gap-3">
                                            {passed
                                                ? <i className="ph ph-check-circle text-emerald-500 text-2xl shrink-0"></i>
                                                : <i className="ph ph-x-circle text-red-500 text-2xl shrink-0"></i>}
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-900">{checkDetail.label}</h3>
                                                <p className={`text-sm font-medium mt-0.5 ${passed ? 'text-emerald-700' : 'text-red-700'}`}>
                                                    {passed ? '✅ Good on your website' : '❌ Needs improvement on your website'}
                                                </p>
                                            </div>
                                        </div>
                                        <button type="button" onClick={() => setCheckDetail(null)} className="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-white/80">
                                            <i className="ph ph-x text-xl"></i>
                                        </button>
                                    </div>
                                    <div className="p-6 space-y-5">

        // ── Bootstrap: auth then render ──────────────────────────────────────────
        async function bootstrap() {
            let needsSignIn = false;
            let authUser = null;
            let authProvider = 'none';
            let authError = null;

            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                sessionStorage.setItem('auth_token', urlToken);
            }
            if (params.get('auth_error')) {
                authError = params.get('auth_error');
            }
            if (urlToken || params.get('auth_error') || params.get('auth_success')) {
                window.history.replaceState({}, '', window.location.pathname);
            }

            try {
                const config = await fetch('/api/v1/config').then(r => r.json()).catch(() => ({}));
                authProvider = config.auth_provider || 'none';
                _authProvider = authProvider;

                const token = getAuthToken();

                if (authProvider === 'google') {
                    if (!token) {
                        needsSignIn = true;
                    } else {
                        authUser = await loadGoogleAuthUser(token);
                        if (!authUser) {
                            sessionStorage.removeItem('auth_token');
                            needsSignIn = true;
                        }
                    }
                } else if (authProvider === 'clerk') {
                    const pk = config.clerk_publishable_key || '';
                    if (pk && window.Clerk) {
                        _clerk = new window.Clerk(pk);
                        await _clerk.load();
                        if (!_clerk.user) {
                            needsSignIn = true;
                        } else {
                            authUser = _clerk.user;
                        }
                    }
                } else if (!config.auth_required) {
                    authUser = { fullName: 'Dev User', firstName: 'Dev', primaryEmailAddress: { emailAddress: 'dev@localhost' } };
                } else {
                    needsSignIn = true;
                }
            } catch (e) {
                console.warn('Auth init failed:', e);
                needsSignIn = true;
            }

            ReactDOM.createRoot(document.getElementById('root')).render(
                <App needsSignIn={needsSignIn} authUser={authUser} authProvider={authProvider} authError={authError} />
            );
        }

        bootstrap();
    </script>
