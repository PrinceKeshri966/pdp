<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commerce Copilot — AI Commerce Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-950: #0a0f1e;
            --navy-900: #0f172a;
            --navy-800: #1e293b;
            --accent-from: #6366f1;
            --accent-via: #8b5cf6;
            --accent-to: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.45);
        }
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #94a3b8, #6366f1); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* ── Animations ── */
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .fade-in-report { animation: fadeInReport 0.45s ease forwards; }
        @keyframes fadeInReport { from { opacity: 0; } to { opacity: 1; } }
        .tab-panel-enter { animation: tabPanelIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes tabPanelIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulseSoft { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spinCenter { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes floatSlow { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(8px, -10px) scale(1.03); } 66% { transform: translate(-6px, 6px) scale(0.98); } }
        @keyframes glowPulse { 0%, 100% { opacity: 0.45; transform: scale(1); } 50% { opacity: 0.75; transform: scale(1.08); } }
        @keyframes ringPulse { 0% { transform: scale(0.85); opacity: 0.7; } 100% { transform: scale(1.35); opacity: 0; } }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        @keyframes gridDrift { 0% { transform: translateY(0); } 100% { transform: translateY(40px); } }

        /* ── App shell & mesh backgrounds ── */
        .app-shell { background: linear-gradient(145deg, #f8fafc 0%, #eef2ff 35%, #f1f5f9 100%); }
        .mesh-bg { position: relative; }
        .mesh-bg::before {
            content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
            background-image:
                radial-gradient(at 20% 20%, rgba(99, 102, 241, 0.12) 0, transparent 50%),
                radial-gradient(at 80% 10%, rgba(139, 92, 246, 0.1) 0, transparent 45%),
                radial-gradient(at 60% 80%, rgba(59, 130, 246, 0.08) 0, transparent 40%);
        }
        .grid-noise::after {
            content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0.35; z-index: 0;
            background-image: linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            animation: gridDrift 20s linear infinite;
        }

        /* ── Glass & cards ── */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 24px -4px rgba(15, 23, 42, 0.08), inset 0 1px 0 rgba(255,255,255,0.6);
        }
        .premium-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.95) 0%, rgba(248,250,252,0.9) 100%);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(15 23 42 / 0.05), 0 8px 24px -8px rgb(79 70 229 / 0.08);
            transition: box-shadow 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
        }
        .premium-card:hover { box-shadow: 0 16px 40px -12px rgb(79 70 229 / 0.18); transform: translateY(-2px); border-color: rgba(99, 102, 241, 0.25); }
        .metric-card-premium {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            background: linear-gradient(160deg, #fff 0%, #f8fafc 100%);
        }
        .metric-card-premium:hover { transform: translateY(-3px); box-shadow: 0 12px 28px -8px rgb(79 70 229 / 0.15); }
        .metric-glow { position: relative; overflow: hidden; }
        .metric-glow::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── Buttons ── */
        .gradient-accent { background: linear-gradient(135deg, var(--accent-from) 0%, var(--accent-via) 50%, var(--accent-to) 100%); background-size: 200% 200%; }
        .gradient-accent-animated { background: linear-gradient(135deg, #6366f1, #8b5cf6, #3b82f6, #6366f1); background-size: 300% 300%; animation: gradientShift 6s ease infinite; }
        .btn-premium {
            position: relative; overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 4px 14px -3px rgba(99, 102, 241, 0.45);
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 12px 28px -6px rgba(99, 102, 241, 0.5); }
        .btn-premium:active { transform: translateY(0); }
        .btn-premium::after {
            content: ''; position: absolute; inset: 0; background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.22) 50%, transparent 60%);
            transform: translateX(-100%); transition: transform 0.5s ease;
        }
        .btn-premium:hover::after { transform: translateX(100%); }
        .btn-google-premium {
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(15,23,42,0.06);
        }
        .btn-google-premium:hover { transform: translateY(-1px); box-shadow: 0 8px 24px -6px rgba(15,23,42,0.12); border-color: #c7d2fe; }

        /* ── Inputs ── */
        .input-glow-wrap {
            transition: box-shadow 0.25s ease, border-color 0.25s ease;
            border: 1px solid rgba(226, 232, 240, 0.9);
        }
        .input-glow-wrap:focus-within {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12), 0 8px 32px -8px rgba(99, 102, 241, 0.25);
        }

        /* ── Sidebar ── */
        .sidebar-premium {
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            border-right: 1px solid rgba(255,255,255,0.06);
            box-shadow: 4px 0 24px -8px rgba(15, 23, 42, 0.2);
            min-width: 180px;
            max-width: 420px;
        }
        .sidebar-resize-handle {
            width: 5px;
            flex-shrink: 0;
            cursor: col-resize;
            background: transparent;
            transition: background 0.15s ease;
            z-index: 25;
            position: relative;
        }
        .sidebar-resize-handle:hover,
        .sidebar-resize-handle:active {
            background: rgba(99, 102, 241, 0.4);
        }
        .sidebar-resize-handle::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: -4px;
            right: -4px;
        }
        .sidebar-nav-btn {
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .sidebar-nav-btn:hover { background: rgba(255,255,255,0.06); transform: translateX(2px); }
        .sidebar-nav-active {
            background: linear-gradient(135deg, rgba(99,102,241,0.25) 0%, rgba(139,92,246,0.15) 100%);
            border-color: rgba(129, 140, 248, 0.35);
            box-shadow: 0 0 20px -4px rgba(99, 102, 241, 0.4), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* ── Tabs ── */
        .sticky-tab-bar {
            position: sticky;
            top: 4rem;
            z-index: 25;
            background: rgba(248, 250, 252, 0.94);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 0.5rem 0;
            margin: 0 -1.5rem 1rem;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
            border-bottom: 1px solid rgba(226, 232, 240, 0.9);
        }
        @media (min-width: 1024px) {
            .sticky-tab-bar { margin-left: -2rem; margin-right: -2rem; padding-left: 2rem; padding-right: 2rem; }
        }
        .report-tab-btn {
            position: relative; transition: all 0.22s ease;
            border: 1px solid transparent;
        }
        .report-tab-btn:hover:not(.report-tab-active) {
            transform: translateY(-1px);
            background: rgba(255,255,255,0.9);
            border-color: rgba(226,232,240,0.9);
            box-shadow: 0 4px 12px -4px rgba(15,23,42,0.08);
        }
        .report-tab-active {
            box-shadow: 0 4px 14px -4px rgba(99, 102, 241, 0.4) !important;
        }

        /* ── Loaders (fixed axis — no wobble) ── */
        .spinner-wrap {
            width: 1.5rem; height: 1.5rem; flex-shrink: 0;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .spinner-wrap-lg { width: 3rem; height: 3rem; }
        .spinner-wrap i.icon-spin-center, i.icon-spin-center {
            display: block; line-height: 1;
            transform-origin: center center;
            animation: spinCenter 0.85s linear infinite;
        }
        .radar-spinner {
            position: relative; width: 48px; height: 48px; flex-shrink: 0;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .radar-spinner::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; box-sizing: border-box;
            border-radius: 50%;
            border: 2px solid rgba(99,102,241,0.15);
            border-top-color: #6366f1;
            animation: spinCenter 0.9s linear infinite;
            transform-origin: center center;
        }

        /* ── Modals ── */
        .modal-backdrop { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); animation: modalFadeIn 0.25s ease-out; }
        .modal-panel {
            animation: modalScaleIn 0.32s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 32px 64px -16px rgba(15, 23, 42, 0.4), 0 0 0 1px rgba(255,255,255,0.1);
        }
        @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalScaleIn { from { opacity: 0; transform: scale(0.94) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .agent-orbit { position: relative; width: 120px; height: 120px; }
        .agent-orbit-ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid rgba(99, 102, 241, 0.35);
            animation: ringPulse 2s ease-out infinite;
        }
        .agent-orbit-ring:nth-child(2) { animation-delay: 0.6s; }
        .agent-orbit-ring:nth-child(3) { animation-delay: 1.2s; }
        .agent-orbit-core {
            position: absolute; inset: 28px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.5);
            display: flex; align-items: center; justify-content: center;
            animation: glowPulse 2.5s ease-in-out infinite;
        }
        .progress-bar-animated { transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Compact site preview card — matches metric row height */
        .site-preview-card {
            background: #fff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 0.75rem;
            box-shadow: 0 1px 3px rgb(15 23 42 / 0.05);
            overflow: hidden;
        }
        .site-preview-card:hover { box-shadow: 0 4px 12px -4px rgb(79 70 229 / 0.12); }

        /* ── Auth hero ── */
        .auth-shell { background: linear-gradient(135deg, #0a0f1e 0%, #1e1b4b 50%, #0f172a 100%); background-size: 200% 200%; animation: gradientShift 12s ease infinite; }
        .auth-orb { position: absolute; border-radius: 50%; filter: blur(60px); animation: floatSlow 8s ease-in-out infinite; }
        .auth-card { animation: modalScaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1), authGlowPulse 5s ease-in-out infinite; }
        .auth-card-glow {
            box-shadow: 0 0 0 1px rgba(129,140,248,0.3), 0 24px 48px -12px rgba(99,102,241,0.25);
        }
        @keyframes authGlowPulse {
            0%, 100% { box-shadow: 0 0 0 1px rgba(129,140,248,0.25), 0 24px 48px -12px rgba(99,102,241,0.2); }
            50% { box-shadow: 0 0 0 1px rgba(167,139,250,0.45), 0 28px 56px -10px rgba(99,102,241,0.35), 0 0 40px -8px rgba(139,92,246,0.25); }
        }

        /* ── Home hero ── */
        .home-hero {
            background: linear-gradient(135deg, rgba(15,23,42,0.97) 0%, rgba(30,27,75,0.95) 50%, rgba(15,23,42,0.97) 100%);
            border: 1px solid rgba(129, 140, 248, 0.2);
            box-shadow: 0 24px 48px -12px rgba(15, 23, 42, 0.35), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .float-chip { animation: float 4s ease-in-out infinite; }
        .float-chip:nth-child(2) { animation-delay: 0.8s; }
        .float-chip:nth-child(3) { animation-delay: 1.6s; }

        /* ── Skeleton ── */
        .skeleton-line {
            height: 0.75rem; border-radius: 0.375rem;
            background: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
            background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite;
        }

        /* ── Misc ── */
        .confidence-dot-live { animation: pulseSoft 2s ease-in-out infinite; }
        .visual-zone-hero { border: 2px solid rgba(99, 102, 241, 0.7); background: rgba(99, 102, 241, 0.12); }
        .visual-zone-cta-miss { border: 2px dashed rgba(239, 68, 68, 0.9); background: rgba(239, 68, 68, 0.15); animation: pulseSoft 1.8s ease-in-out infinite; }
        .visual-zone-trust { border: 2px solid rgba(16, 185, 129, 0.65); background: rgba(16, 185, 129, 0.1); }
        html { scroll-behavior: smooth; }
        .code-block-premium {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .nav-btn {
            width: 2.25rem; height: 2.25rem; border-radius: 0.625rem;
            display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; border: 1px solid transparent;
        }
        .nav-btn:not(:disabled):hover {
            background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.2);
            transform: scale(1.05); box-shadow: 0 4px 12px -4px rgba(99, 102, 241, 0.35);
        }
        .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
        .hover-card-premium {
            transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.28s ease, border-color 0.28s ease;
        }
        .hover-card-premium:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 20px 40px -12px rgba(99, 102, 241, 0.22);
            border-color: rgba(99, 102, 241, 0.25);
        }
        .icon-hover-bounce { transition: transform 0.25s ease; }
        .group:hover .icon-hover-bounce { transform: scale(1.12) rotate(-4deg); }
        .auth-feature-float { animation: float 5s ease-in-out infinite; }
        .auth-feature-float:nth-child(2) { animation-delay: 1s; }
        .auth-feature-float:nth-child(3) { animation-delay: 2s; }
        .auth-feature-float:nth-child(4) { animation-delay: 3s; }
        .example-url-chip {
            transition: all 0.2s ease;
        }
        .example-url-chip:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px -4px rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.4);
        }
        .brand-logo-box { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .brand-logo-box svg { display: block; width: 62%; height: 62%; }
        .header-glass {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.7);
            box-shadow: 0 1px 12px -4px rgba(15, 23, 42, 0.06);
        }
    </style>
</head>
<body class="app-shell text-slate-800 antialiased h-screen flex overflow-hidden">
    <div id="root" class="w-full h-full flex items-center justify-center mesh-bg">
        <div class="text-center p-8 fade-in relative z-10">
            <div class="agent-orbit mx-auto mb-6" style="width:88px;height:88px">
                <div class="agent-orbit-ring"></div>
                <div class="agent-orbit-ring"></div>
                <div class="agent-orbit-core brand-logo-box" style="inset:22px">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M5.5 8.5h13l-1.1 9.5H6.6L5.5 8.5z" stroke="white" stroke-width="1.75" stroke-linejoin="round"/>
                        <path d="M9 8.5V6.75A3 3 0 0 1 15 6.75V8.5" stroke="white" stroke-width="1.75" stroke-linecap="round"/>
                        <path d="M8 14l2.25 2.25L16 10.5" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="17.5" cy="6.5" r="2" fill="white" opacity="0.9"/>
                    </svg>
                </div>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-1 tracking-tight">Commerce Copilot</h3>
            <p class="text-sm text-slate-500">Loading commerce intelligence…</p>
            <div class="flex gap-2 justify-center mt-4">
                <div class="skeleton-line w-16"></div>
                <div class="skeleton-line w-24"></div>
                <div class="skeleton-line w-12"></div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Mode 1 only — hide Mode 2 UI until blueprint flow is production-ready
        const MODE1_FOCUS = true;

        // ── Auth & API helpers ────────────────────────────────────────────────────
        let _clerk = null;
        let _authProvider = 'none';

        function parseJwtPayload(token) {
            try {
                const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(atob(base64));
            } catch (_) { return null; }
        }

        function getAuthToken() {
            return sessionStorage.getItem('auth_token');
        }

        const AUTH_ERROR_MESSAGES = {
            invalid_state: 'Login session expired. Click Continue with Google again.',
            token_exchange_failed: 'Could not verify with Google. Check your Client Secret in .env.',
            userinfo_failed: 'Could not load your Google profile. Try again.',
            missing_code: 'Google did not return a login code. Try again.',
            access_denied: 'You cancelled Google sign-in.',
            api_unreachable: 'Could not connect to the server API. On Vercel, ensure the Python API is deployed and env vars are set.',
        };

        function isLocalDevHost() {
            return /localhost|127\.0\.0\.1/.test(window.location.hostname);
        }

        /** Merge dom_technical_seo from API top-level or persisted json_structured_data._dom_technical_seo */
        function normalizeMode1Result(data) {
            if (!data) return data;
            const jsd = data.json_structured_data || {};
            const nestedDom = jsd._dom_technical_seo || {};
            const topDom = data.dom_technical_seo || {};
            const hasTop = topDom.title_tag || topDom.meta_description;
            const dom = hasTop ? topDom : (Object.keys(nestedDom).length ? nestedDom : topDom);
            const auditRel = data.audit_reliability || jsd._audit_reliability || {};
            const runAnalytics = data.run_analytics || jsd._run_analytics || {};
            const frontendValidation = data.frontend_validation || auditRel.frontend_validation || jsd._frontend_validation || {};
            const scrapeValidation = data.scrape_validation || jsd._scrape_validation || {};
            return {
                ...data,
                dom_technical_seo: dom,
                audit_reliability: auditRel,
                run_analytics: runAnalytics,
                frontend_validation: frontendValidation,
                scrape_validation: scrapeValidation,
            };
        }

        const SCRAPE_GATE_REASONS = {
            page_not_found: 'Page Not Found (404)',
            product_not_found: 'Product Not Found',
            access_denied: 'Access Denied (403)',
            captcha_block: 'CAPTCHA / Bot Check',
            login_required: 'Login Required',
            empty_content: 'Empty Content',
        };

        const SCRAPE_GATE_DESCRIPTIONS = {
            page_not_found: 'The provided URL does not contain a valid product or landing page.',
            product_not_found: 'The product page was not found or is no longer available.',
            access_denied: 'The site blocked access to this page. No audit could be performed.',
            captcha_block: 'The site returned a bot-check or CAPTCHA page instead of real content.',
            login_required: 'This page requires login. We cannot audit gated content.',
            empty_content: 'The page returned too little content to analyze.',
        };

        /** Hard-fail scrape gate payload when analysis stopped before extraction. */
        function resolveScrapeGateFailure(result) {
            if (!result) return null;
            const sv = result.scrape_validation || result.json_structured_data?._scrape_validation || {};
            const gate = sv.hard_fail;
            if (gate && (gate.hard_fail || gate.code)) return gate;
            const scrapeGateErr = (result.errors || []).find(e => String(e).startsWith('scrape_gate:'));
            if (result.status === 'failed' && scrapeGateErr) {
                const code = String(scrapeGateErr).split(':')[1] || 'unknown';
                return {
                    code,
                    message: SCRAPE_GATE_DESCRIPTIONS[code] || 'The page could not be analyzed.',
                    hard_fail: true,
                };
            }
            return null;
        }

        function getScrapeGateReasonLabel(code) {
            return SCRAPE_GATE_REASONS[code] || 'Invalid Page';
        }

        function getScrapeGateDescription(code, gate) {
            return gate?.message && !String(gate.message).startsWith('scrape_gate:')
                ? gate.message
                : (SCRAPE_GATE_DESCRIPTIONS[code] || 'The provided URL does not contain a valid product or landing page.');
        }

        /** True when title is just a hostname / bare domain (e.g. "boat-lifestyle.com"). */
        function isBareHostnameTitle(title, url) {
            const t = String(title || '').trim();
            if (!t) return false;
            const lower = t.toLowerCase().replace(/^www\./, '');
            if (/^[a-z0-9-]+(\.[a-z0-9-]+)+$/i.test(lower)) return true;
            try {
                const raw = url && String(url).trim();
                if (!raw) return false;
                const u = new URL(raw.startsWith('http') ? raw : `https://${raw}`);
                const host = u.hostname.replace(/^www\./, '').toLowerCase();
                const hostBare = host.split('.')[0];
                if (lower === host || lower === host.replace(/\./g, '') || lower === hostBare) return true;
                if (t.length < 28 && (lower.includes(host) || lower === hostBare)) return true;
            } catch { /* ignore */ }
            return false;
        }

        /**
         * Authoritative page title for UI — prefer rendered DOM, never show bare hostname.
         * Priority: dom_technical_seo.title_tag → seo_report.title_tag.value →
         *           json_structured_data.product_name → seo_report.h1.value
         */
        function resolvePageTitle(result) {
            if (!result) return '';
            const dom = result.dom_technical_seo || {};
            const seo = result.seo_report || {};
            const jsd = result.json_structured_data || {};
            const url = result.source_url || jsd.product_url || '';
            const candidates = [
                dom.title_tag,
                seo.title_tag?.value,
                jsd.product_name,
                seo.h1?.value,
            ];
            for (const c of candidates) {
                if (!c || !String(c).trim()) continue;
                const s = String(c).trim();
                if (isBareHostnameTitle(s, url)) continue;
                return s;
            }
            return '';
        }

        /** Title tag block for cards/SERP — merges seo_report metadata with resolved value. */
        function resolveTitleTagBlock(result) {
            const seo = result?.seo_report || {};
            const base = seo.title_tag || {};
            const value = resolvePageTitle(result);
            return {
                ...base,
                value,
                length: value ? value.length : 0,
            };
        }

        /** AutoFix fields that passed before/after validation (no identical no-op fixes). */
        function getValidatedAutofixFix(autofixRpt, field) {
            if (!autofixRpt) return null;
            const vf = autofixRpt._valid_fixes || {};
            if (vf[field] === false) return null;
            const map = { fixed_title_tag: 'title_tag', fixed_meta_description: 'meta_description', fixed_h1: 'h1', rewritten_product_description: 'description' };
            const comp = (autofixRpt.fix_comparisons || []).find(x => x.field === map[field]);
            if (comp) return comp.valid_fix ? (comp.after || null) : null;
            if (vf[field] === true) return autofixRpt[field] || null;
            return null;
        }

            const l = (level || '').toLowerCase();
            if (l === 'high') return { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', dot: 'bg-emerald-500' };
            if (l === 'medium') return { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-900', dot: 'bg-amber-500' };
            return { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-900', dot: 'bg-red-500' };

        /** Downgrade competitor UI when scrapes fail or demo skipped discovery. */
        const COMPETITOR_CONFIDENCE_THRESHOLD = 0.45;

        function getCompetitorTrust(competitorRpt) {
            if (!competitorRpt || !Object.keys(competitorRpt).length) {
                return { weak: true, quality: 'none', reason: 'No competitor data', suppressMatrix: true };
            }
            if (competitorRpt.skipped) {
                return { weak: true, quality: 'skipped', reason: competitorRpt.skip_reason || 'Competitor discovery skipped', suppressMatrix: true };
            }
            const ds = String(competitorRpt.data_source || '').toLowerCase();
            const sites = (competitorRpt.live_compare || {}).sites || [];
            const competitors = sites.filter(s => s.role === 'competitor');
            const scraped = competitors.filter(s => s.scrape_ok).length;
            const errors = competitors.filter(s => /ERROR|could not be satisfied|Access Denied/i.test(String((s.features || {}).product_name || '')));
            if (ds === 'skipped' || ds === 'user_only' || scraped === 0) {
                return { weak: true, quality: 'weak', reason: `Limited data (${ds || 'no live scrapes'})`, suppressMatrix: scraped === 0 };
            }
            if (errors.length) {
                return { weak: true, quality: 'partial', reason: `${errors.length} competitor page(s) blocked or failed`, suppressMatrix: false };
            }
            return { weak: false, quality: 'good', reason: `${scraped} competitor page(s) scraped live`, suppressMatrix: false };
        }

        /** Competitor Intelligence — merges live compare + benchmarks with backend confidence gates. */
        function getCompetitorIntelligence(competitorRpt, mode1Result) {
            const base = getCompetitorTrust(competitorRpt);
            const reliability = mode1Result?.audit_reliability || {};
            const ecRaw = reliability.extraction_confidence
                ?? mode1Result?.extraction_confidence?.overall_extraction_confidence
                ?? 0;
            const extConf = Number(ecRaw) || 0;
            const extPct = reliability.extraction_confidence_pct ?? Math.round(extConf * 100);
            const skipped = Boolean(competitorRpt?.skipped);
            const competitorSites = ((competitorRpt?.live_compare?.sites || []).filter(s => s.role === 'competitor' && s.scrape_ok)).length;
            const hasBenchmark = Boolean(
                competitorRpt?.market_positioning?.price_tier
                || competitorRpt?.benchmark_scores?.avg_seo_score != null
                || (competitorRpt?.your_gaps_vs_competitors || []).length
                || (competitorRpt?.winning_patterns || []).length
            );
            const confidenceOk = extConf >= COMPETITOR_CONFIDENCE_THRESHOLD;
            const showLiveCompare = confidenceOk && !skipped && !base.suppressMatrix && competitorSites > 0;
            const showBenchmark = confidenceOk && !skipped && hasBenchmark;
            const unavailable = skipped || !confidenceOk || (!showLiveCompare && !showBenchmark);
            const unavailableReason = skipped
                ? (competitorRpt?.skip_reason || 'Competitor analysis was skipped by the audit pipeline')
                : !confidenceOk
                    ? `Extraction confidence ${extPct}% is below ${Math.round(COMPETITOR_CONFIDENCE_THRESHOLD * 100)}% — we hide live competitor comparison to avoid misleading data`
                    : !showLiveCompare && !showBenchmark
                        ? base.reason || 'No reliable competitor data was collected for this URL'
                        : null;
            return {
                ...base,
                extConf,
                extPct,
                confidenceOk,
                showLiveCompare,

                unavailable,

        async function apiFetch(path, options = {}) {
            // Allow FormData body to be sent without forcing JSON content-type
            const isForm = options && options.body && (options.body instanceof FormData);
            const headers = isForm ? { ...(options.headers || {}) } : { 'Content-Type': 'application/json', ...(options.headers || {}) };
            const stored = getAuthToken();
            if (stored) {
                headers['Authorization'] = `Bearer ${stored}`;
            } else if (_clerk?.session) {
                try {
                    const token = await _clerk.session.getToken();
                    if (token) headers['Authorization'] = `Bearer ${token}`;
                } catch (_) {}
            }
            const fetchOptions = { ...options, headers };
            // If body is an object and not already a string or FormData, stringify it for JSON
            if (!isForm && fetchOptions.body && typeof fetchOptions.body !== 'string') {
                fetchOptions.body = JSON.stringify(fetchOptions.body);
            }
            const resp = await fetch(path, fetchOptions);
            if (!resp.ok) {
                let detail = `HTTP ${resp.status}`;
                try { detail = (await resp.json()).detail || detail; } catch (_) {}
                throw new Error(detail);
            }
            return resp.json();
        }

        async function apiStreamAnalyze(path, body, onProgress) {
            const headers = { 'Content-Type': 'application/json', Accept: 'text/event-stream' };
            const stored = getAuthToken();
            if (stored) {
                headers['Authorization'] = `Bearer ${stored}`;
            } else if (_clerk?.session) {
                try {
                    const token = await _clerk.session.getToken();
                    if (token) headers['Authorization'] = `Bearer ${token}`;
                } catch (_) {}
            }
            const resp = await fetch(path, {
                method: 'POST',
                headers,
                body: JSON.stringify(body),
                credentials: 'include',
            });
            if (!resp.ok) {
                let detail = `HTTP ${resp.status}`;
                try { detail = (await resp.json()).detail || detail; } catch (_) {}
                throw new Error(detail);
            }
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n\n');
                buffer = parts.pop() || '';
                for (const part of parts) {
                    const line = part.split('\n').find(l => l.startsWith('data: '));
                    if (!line) continue;
                    const data = JSON.parse(line.slice(6));
                    if (data.type === 'progress' && onProgress) onProgress(data);
                    if (data.type === 'error') throw new Error(data.detail || 'Analysis failed');
                    if (data.type === 'done') return data.result;
                }
            }
            throw new Error('Stream ended before analysis completed');
        }

        function mapBoundsToOverlayPct(bounds, viewportW, viewportH, containerW, containerH, imgNaturalW, imgNaturalH) {
            if (!bounds || !viewportW || !viewportH || !containerW || !containerH) return null;
            const srcW = imgNaturalW || viewportW;
            const srcH = imgNaturalH || viewportH;
            const scale = Math.max(containerW / srcW, containerH / srcH);
            const renderedW = srcW * scale;
            const renderedH = srcH * scale;
            const offsetX = (containerW - renderedW) / 2;
            const offsetY = 0;
            const sx = srcW / viewportW;
            const sy = srcH / viewportH;
            const x = bounds.x * sx;
            const y = bounds.y * sy;
            const w = bounds.width * sx;
            const h = bounds.height * sy;
            const left = offsetX + x * scale;
            const top = offsetY + y * scale;
            return {
                left: `${Math.max(0, (left / containerW) * 100)}%`,
                top: `${Math.max(0, (top / containerH) * 100)}%`,
                width: `${Math.min(100, (w * scale / containerW) * 100)}%`,
                height: `${Math.min(100, (h * scale / containerH) * 100)}%`,
            };
        }

                        <div key={i} className="flex justify-between gap-3 text-sm border-b border-slate-100 last:border-0 pb-2 last:pb-0">
                            <span className="text-slate-500 shrink-0">{item.label}</span>
                            <span className="text-slate-800 font-medium text-right break-words">{item.value}</span>
                        </div>
                    ))}
                </div>
            );
        }

        function HowWeDetectedBlock({ evidence }) {
            if (!evidence) return null;
            return (
                <div className="rounded-xl border border-slate-200 bg-slate-50 p-4 space-y-3">
                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wide">How we detected this</p>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm">
                        <div>
                            <p className="text-[10px] font-bold text-slate-400 uppercase">Source</p>
                            <p className="text-slate-800 font-medium mt-0.5">{evidence.source || '—'}</p>
                        </div>
                        <div>
                            <p className="text-[10px] font-bold text-slate-400 uppercase">Confidence</p>
                            <p className="text-slate-800 font-medium mt-0.5">{evidence.confidence != null ? `${Math.round(evidence.confidence * 100)}%` : '—'}</p>
                        </div>
                        <div className="sm:col-span-1">
                            <p className="text-[10px] font-bold text-slate-400 uppercase">Detection method</p>
                            <p className="text-slate-700 mt-0.5 text-xs leading-relaxed">{evidence.detection_method || '—'}</p>
                        </div>
                    </div>
                    {evidence.extracted_text && (
                        <div className="pt-2 border-t border-slate-200">
                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Extracted text</p>
                            <p className="text-sm text-slate-800 leading-relaxed">{evidence.extracted_text}</p>
                        </div>
                    )}
                    <AuditEvidenceItems evidence={evidence} />
                </div>
            );
        }

        function stripHtmlEvidence(raw) {
            if (!raw) return '';
            return String(raw)
                .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"')
                .replace(/<[^>]+>/g, '')
                .replace(/VERIFIED JSON-LD block:/gi, '')
                .replace(/VERIFIED:/gi, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function formatHumanEvidence(checkId, detectedVal, result) {
            const seo = result?.seo_report || {};
            const ux = result?.ux_report || {};
            const labels = {
                kw_in_h1: 'Detected H1',
                kw_in_title: 'Detected page title',
                kw_in_meta: 'Detected meta description',
                trust_reviews: 'Reviews on page',
                trust_rating: 'Rating visible',
                cta_found: 'Primary CTA',
            };
            const direct = {
                kw_in_h1: seo.h1?.value,
                kw_in_title: resolvePageTitle(result),
                kw_in_meta: seo.meta_description?.value,
            };
            if (direct[checkId]) {
                return { label: labels[checkId] || 'Evidence detected', value: direct[checkId], technical: detectedVal };
            }
            if (detectedVal) {
                const human = stripHtmlEvidence(detectedVal);
                return { label: labels[checkId] || 'Evidence detected', value: human || detectedVal, technical: detectedVal };
            }
            if (checkId === 'trust_reviews' && ux.trust_signals?.reviews_present != null) {
                return { label: 'Reviews on page', value: ux.trust_signals.reviews_present ? 'Reviews found' : 'No reviews section', technical: null };
            }
            return null;
        }

        function getScreenshotSrc(url, visualUx) {
            if (visualUx?.screenshot_base64) {
                return `data:image/png;base64,${visualUx.screenshot_base64}`;
            }
            return sitePreviewUrl(url);
        }

        /** PDP-only checks: no misleading screenshot on homepage audits */
        const PDP_ONLY_VISUAL_CHECKS = new Set([
            'img_angles', 'img_zoom', 'img_lifestyle', 'img_video',
            'info_size_guide', 'info_material', 'info_fit', 'info_specs',
            'checkout_guest', 'checkout_one_click', 'urgency_stock',
        ]);

        function getCheckPageLocation(checkId) {
            const V = (zone, top, height, hint) => ({
                zone, top, height, hint, serpOnly: false, visualPreview: true,
            });
            const T = (zone, hint) => ({
                zone, top: null, height: null, hint, serpOnly: false, visualPreview: false,
            });
            const S = (zone, hint) => ({
                zone, top: null, height: null, hint, serpOnly: true, visualPreview: false,
            });

            const zones = {
                kw_in_h1: V('Main H1 headline', '22%', '12%', 'Your H1 is the largest headline in the hero — below the top banner.'),
                kw_in_first_100: V('Opening paragraph', '24%', '14%', 'First text block under the main headline.'),
                headings_logical_hierarchy: V('Section headings (H2/H3)', '32%', '40%', 'Scroll through section titles — FITCOACH, FITFEAST blocks, etc.'),
                headings_keywords: V('Section headings (H2/H3)', '32%', '40%', 'Keywords should appear in section headings as you scroll.'),
                content_adequate: V('Main page content', '28%', '50%', 'Body copy, feature lists, and benefit sections across the page.'),
                content_unique: V('Main page content', '28%', '50%', 'Brand story and feature descriptions in the middle of the page.'),
                trust_reviews: V('Reviews & ratings strip', '48%', '16%', 'Star ratings and review counts (e.g. 4.7★, 30K+ reviews).'),
                trust_rating: V('Star rating badge', '46%', '12%', 'Average rating shown near trust or download stats.'),
                trust_return: V('Footer policies', '82%', '14%', 'Return/refund links in the footer.'),
                trust_security: V('Footer / payment trust', '78%', '16%', 'Payment icons and security badges near footer or signup.'),
                trust_moneyback: V('Trust near CTA', '12%', '14%', 'Guarantee text near Get Started / Log in.'),
                cta_found: V('Primary buttons (Get Started)', '10%', '14%', 'Main CTA in the header or hero — Get Started, Log in, Download.'),
                cta_above_fold: V('Hero / header CTAs', '8%', '22%', 'Buttons visible without scrolling — top navigation area.'),
                urgency_limited: V('Top promo banner', '4%', '10%', 'Limited-time or campaign banners at the very top.'),
                urgency_social: V('Social proof line', '44%', '12%', '"7M+ users" or similar proof near ratings.'),
                faq_found: V('FAQ section', '68%', '20%', 'FAQ accordion — usually lower on the page.'),
                faq_conversational: V('FAQ section', '68%', '20%', 'How questions are worded in the FAQ block.'),
                emotion_identity: V('Hero / brand message', '20%', '18%', 'Identity-focused headline and subcopy in the hero.'),
                emotion_aspirational: V('Hero / lifestyle copy', '22%', '20%', 'Aspirational language in hero or feature sections.'),
                peak_end_rule: V('Bottom CTA / closing section', '75%', '18%', 'Strong closing CTA or app-download block before footer.'),

                kw_in_title: S('Browser tab / Google title', 'Title tag — see Evidence detected or Google Ranking SERP preview.'),
                kw_in_meta: S('Google search snippet', 'Meta description — not visible on the live page body.'),
                meta_has_cta: S('Google search snippet', 'CTA in meta — only appears in Google results.'),
                tech_canonical: S('HTML <head>', 'Canonical is in page source — see Evidence detected below.'),
                tech_og: S('HTML <head>', 'Open Graph tags — see source fact or SEO tab.'),
                tech_twitter: T('HTML <head>', 'Twitter Card meta tags are in page source, not visible on screen.'),
                tech_hreflang: T('HTML <head>', 'Hreflang tags are in page source for multi-language sites.'),
                tech_mobile: T('Whole page (responsive)', 'Mobile-friendly is a technical test — resize browser or use Lighthouse.'),
                tech_lazy_loading: T('Images (technical)', 'Lazy-loading is in HTML attributes — not obvious in a screenshot.'),
                tech_images_optimized: T('Images (technical)', 'Image weight is a performance metric — not a single page zone.'),
                tech_pagination: T('Listing pages', 'Pagination applies to category/search pages, not this homepage.'),
                schema_product: S('JSON-LD in source', 'Product schema is in HTML source — homepage often uses Organization instead.'),
                schema_breadcrumb: S('JSON-LD in source', 'Breadcrumb schema is embedded in page source.'),
                schema_review: S('JSON-LD in source', 'Review schema is in page source — may power star snippets in Google.'),
                faq_schema: S('JSON-LD in source', 'FAQ schema is in page source, not a visible box on screen.'),
                speakable_schema: S('JSON-LD / voice SEO', 'Speakable schema is for voice assistants — in source only.'),

                price_charm: T('Membership / pricing page', 'Charm pricing (₹999) is on plan cards — open pricing or scroll to membership section on your live site.'),
                price_anchor: T('Pricing tiles', 'Anchor pricing needs visible "was/now" on plan cards — not in the hero screenshot.'),
                decoy_pricing: T('Plan comparison', 'Decoy pricing needs 3+ plan tiers side by side — check your pricing page.'),
                img_angles: T('Product gallery', 'Multiple product angles apply to product pages, not typical homepages.'),
                img_zoom: T('Product gallery', 'Zoom applies to product detail images.'),
                img_lifestyle: T('Product gallery', 'Lifestyle shots are on product PDPs.'),
                img_video: T('Video section', 'Product video — check hero video or media section if present.'),
                cta_sticky: T('Mobile sticky bar', 'Sticky CTA appears on mobile when scrolling — test on phone width.'),
                info_size_guide: T('Product details', 'Size guide is for fashion/product PDPs.'),
                info_material: T('Product specs', 'Material info is on product detail pages.'),
                info_fit: T('Product specs', 'Fit description is for apparel PDPs.'),
                info_specs: T('Specifications', 'Specs table is on product detail pages.'),
                checkout_guest: T('Checkout flow', 'Guest checkout is on cart/checkout — not homepage.'),
                checkout_one_click: T('Checkout flow', 'One-click buy is on checkout, not landing page.'),
                urgency_stock: T('Product stock counter', 'Stock counters are on product pages near Add to Cart.'),

                geo_perplexity: T('AI-citable content', 'Perplexity cites clear factual paragraphs — see AEO tab recommendations.'),
                geo_sge: T('AI Overview content', 'Structured answers for Google AI — content quality across the page.'),
                geo_direct_answer: T('Answer-ready copy', 'Direct Q&A style paragraphs — mid-page content sections.'),
                rag_citable: T('Citable facts', 'Unique facts and stats (7M users, 12k gyms) in page copy.'),
                rag_uvp: T('Value proposition', 'What makes you different — hero and feature sections.'),
                rag_factual: T('Factual claims', 'Numbers and claims in body copy — verify in text below.'),
                aeo_conversational: T('Conversational copy', 'Natural language in descriptions — read page text.'),
                aeo_llm_snippet: T('Snippet-ready paragraphs', 'Short clear paragraphs AI can quote.'),
                aeo_not_commodity: T('Unique content', 'Differentiation vs competitors — full page read.'),
                aeo_unique_perspective: T('Brand angle', 'Unique positioning in hero and features.'),
            };
            return zones[checkId] || {
                zone: 'This check',
                top: null,
                height: null,
                hint: 'No page screenshot for this check — use the explanation and extracted facts above.',
                serpOnly: false,
                visualPreview: false,
            };
        }

        function isHomepageAudit(result) {
            const lc = result?.competitor_report?.live_compare;
            return lc?.compare_page_type === 'homepage';
        }

        /** Show site screenshot only when we can point to a real on-page zone for this check */
        function shouldShowCheckImage(checkId, result) {
            const visualUx = result?.audit_reliability?.visual_ux_facts || {};
            const boundKey = CHECK_BOUND_KEYS[checkId];
            if (boundKey && visualUx.element_bounds?.[boundKey]) return true;
            const loc = getCheckPageLocation(checkId);
            if (!loc.visualPreview || loc.serpOnly || !loc.top) return false;
            if (result && isHomepageAudit(result) && PDP_ONLY_VISUAL_CHECKS.has(checkId)) return false;
            return true;
        }

        function tabHasReportData(tabId, ctx) {
            const { seoRpt, aeoRpt, uxRpt, psychRpt, autofixRpt } = ctx;
            const hasAutofix = Boolean(
                autofixRpt?.fixed_title_tag || autofixRpt?.fixed_meta_description || autofixRpt?.fixed_h1
                || autofixRpt?.rewritten_product_description || (autofixRpt?.code_blocks || []).length
            );
            switch (tabId) {
                case 'SEO': return Boolean(seoRpt && Object.keys(seoRpt).length);
                case 'AEO': return Boolean(aeoRpt?.ai_visibility_score != null || (aeoRpt?.gaps || []).length);
                case 'UX': return Boolean(uxRpt?.conversion_score != null);
                case 'PSYCHOLOGY': return Boolean(psychRpt?.overall_psychology_score != null);
                case 'COMPINTEL': return true;
                case 'AUTOFIX': return hasAutofix;
                default: return true;
            }
        }

        function getDomEvidenceForCheck(checkId, result) {
            const dom = result?.dom_technical_seo || {};
            const seo = result?.seo_report || {};
            const tech = seo.technical_seo || {};
            const struct = seo.structured_data || {};
            const pageUrl = result?.source_url || 'https://yoursite.com/product';
            const esc = (s) => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

            if (checkId === 'tech_canonical') {
                const present = dom.canonical_present ?? tech.canonical_present;
                if (present === true) {
                    return '&lt;link rel="canonical" href="' + esc(pageUrl) + '" /&gt;';
                }
                if (present === false) {
                    return '&lt;!-- VERIFIED: no canonical link in HTML source --&gt;';
                }
            }
            if (checkId === 'schema_product') {
                const present = dom.product_schema_present ?? struct.has_product_schema;
                if (present === true) {
                    return 'VERIFIED JSON-LD block: {"@type": "Product", "name": "...", "offers": {...}}';
                }
                if (present === false) {
                    return 'VERIFIED: no Product @type in application/ld+json blocks';
                }
            }
            if (checkId === 'tech_og') {
                const present = dom.open_graph_present ?? tech.open_graph_present;
                if (present === true) {
                    return '&lt;meta property="og:title" content="..." /&gt;\n&lt;meta property="og:description" content="..." /&gt;';
                }
                if (present === false) {
                    return '&lt;!-- VERIFIED: no og:title meta in HTML head --&gt;';
                }
            }
            if (checkId === 'kw_in_meta' || checkId === 'meta_has_cta') {
                const val = dom.meta_description ?? seo.meta_description?.value;
                if (val) {
                    return '&lt;meta name="description" content="' + esc(val).slice(0, 200) + '" /&gt;';
                }
                if (val === null || (dom.meta_description === null && !seo.meta_description?.value)) {
                    return '&lt;!-- VERIFIED: no meta description in HTML source --&gt;';
                }
            }
            if (checkId === 'faq_schema') {
                const present = dom.faq_schema_present ?? struct.has_faq_schema;
                if (present === true) {
                    return 'VERIFIED JSON-LD block: {"@type": "FAQPage", "mainEntity": [...]}';
                }
                if (present === false) {
                    return 'VERIFIED: no FAQPage JSON-LD in page source';
                }
            }
            if (checkId === 'kw_in_h1') {
                const h1 = seo.h1?.value;
                if (h1) return '&lt;h1&gt;' + esc(h1.slice(0, 120)) + '&lt;/h1&gt;';
                return '&lt;!-- VERIFIED: no h1 element in page DOM --&gt;';
            }
            if (checkId === 'kw_in_title') {
                const t = resolvePageTitle(result) || dom.title_tag;
                if (t) return '&lt;title&gt;' + esc(t.slice(0, 120)) + '&lt;/title&gt;';
                return '&lt;!-- VERIFIED: empty or missing title tag --&gt;';
            }
            if (checkId === 'aeo_llm_snippet') {
                const cq = result?.aeo_report?.content_quality || {};
                if (cq.llm_snippet_ready === true) {
                    return 'AEO audit: snippet-ready paragraphs detected in page content.';
                }
                if (cq.llm_snippet_ready === false) {
                    return 'AEO audit: no clear 2–3 sentence AI-quotable summary block found in scraped text.';
                }
            }
            return null;
        }

        const COMPARE_METRIC_HELP = {
            images_count: 'How many images appear in the scraped HTML of that single URL (not the whole site).',
            page_word_count: 'Total words in the text we scraped from that exact page URL at audit time.',
            has_reviews: 'Whether review/rating language appears on that scraped page.',
            review_count: 'Review count if visible in that page’s scraped text.',
            has_video: 'Whether video/embed keywords appear on that scraped page.',
            has_size_guide: 'Whether size-guide language appears on that scraped page.',
            has_return_policy: 'Whether return-policy language appears on that scraped page.',
        };

        function getDetectedValueForCheck(checkId, result) {
            const domSnippet = getDomEvidenceForCheck(checkId, result);
            if (domSnippet) return domSnippet;

            const seo = result?.seo_report || {};
            const ux = result?.ux_report || {};
            const map = {
                kw_in_h1: seo.h1?.value,
                kw_in_title: resolvePageTitle(result),
                kw_in_meta: seo.meta_description?.value,
                trust_reviews: ux.trust_signals?.reviews_present != null ? (ux.trust_signals.reviews_present ? 'Reviews found' : 'No reviews section') : null,
                trust_rating: ux.trust_signals?.avg_rating != null ? `Rating: ${ux.trust_signals.avg_rating}` : null,
                img_video: ux.product_imagery?.video_present != null ? (ux.product_imagery.video_present ? 'Video present' : 'No product video') : null,
            };
            return map[checkId] || null;
        }

        function CheckSitePreview({ url, checkId, passed, visualUx, evidence }) {
            const [useIframe, setUseIframe] = useState(false);
            const [imgLoaded, setImgLoaded] = useState(false);
            const containerRef = useRef(null);
            const imgRef = useRef(null);
            const loc = getCheckPageLocation(checkId);
            const preview = getScreenshotSrc(url, visualUx);
            const ev = evidence?.evidence || evidence;
            const boundKey = ev?.bound_key || CHECK_BOUND_KEYS[checkId];
            const bounds = boundKey ? visualUx?.element_bounds?.[boundKey] : null;
            const viewportW = visualUx?.viewport_width || 1366;
            const viewportH = visualUx?.viewport_height || 900;
            const metrics = ev?.visual_metrics || {};
            const showFoldLine = metrics.fold_line_y != null && (checkId === 'cta_above_fold' || checkId === 'cta_found');

            if (!url) return null;
            if (!bounds && ev?.type !== 'visual' && (!loc.visualPreview || !loc.top)) return null;

            const [overlay, setOverlay] = useState(null);
            const [foldPct, setFoldPct] = useState(null);
            useEffect(() => {
                if (!bounds) {
                    setOverlay({ top: loc.top, height: loc.height || '15%', left: '2%', width: 'calc(100% - 1rem)' });
                    setFoldPct(showFoldLine ? `${Math.min(95, (viewportH / viewportH) * 100)}%` : null);
                    return;
                }
                const cw = containerRef.current?.clientWidth || 0;
                const ch = containerRef.current?.clientHeight || 0;
                const nw = imgRef.current?.naturalWidth || viewportW;
                const nh = imgRef.current?.naturalHeight || viewportH;
                const pos = mapBoundsToOverlayPct(bounds, viewportW, viewportH, cw, ch, nw, nh);
                setOverlay(pos ? { ...pos, height: pos.height } : { top: loc.top, height: loc.height || '15%', left: '2%', width: 'calc(100% - 1rem)' });
                if (showFoldLine && nh && ch) {
                    const scale = Math.max(cw / nw, ch / nh);
                    const foldY = (metrics.fold_line_y || viewportH) * (nh / viewportH) * scale;
                    setFoldPct(`${Math.min(98, Math.max(0, (foldY / ch) * 100))}%`);
                } else {
                    setFoldPct(null);
                }
            }, [imgLoaded, bounds, loc.top, loc.height, showFoldLine, viewportH, metrics.fold_line_y]);

            const scrollPct = bounds && overlay?.top
                ? Math.min(85, Math.max(0, parseFloat(String(overlay.top)) - 8))
                : (loc.top ? Math.min(85, Math.max(0, parseFloat(loc.top) - 5)) : 0);
            const objectPosition = bounds ? `center ${scrollPct}%` : `center ${scrollPct}%`;
            const highlightLabel = ev?.highlight_region || loc.zone;

            return (
                <div className="relative rounded-xl overflow-hidden border border-slate-200 bg-slate-100">
                    <div ref={containerRef} className="h-56 md:h-64 relative overflow-hidden">
                        {useIframe || !preview ? (
                            <iframe
                                title="Site preview"
                                src={url}
                                className="w-[400%] h-[400%] origin-top-left scale-[0.25] pointer-events-none border-0 bg-white"
                                style={{ marginTop: loc.top ? `-${scrollPct * 3}%` : 0 }}
                                sandbox="allow-scripts allow-same-origin"
                            />
                        ) : (
                            <img
                                ref={imgRef}
                                src={preview}
                                alt="Your site preview"
                                className="w-full h-full object-cover"
                                style={{ objectPosition }}
                                loading="lazy"
                                onLoad={() => setImgLoaded(true)}
                                onError={() => setUseIframe(true)}
                            />
                        )}
                        {showFoldLine && foldPct && (
                            <div
                                className="absolute left-0 right-0 border-t-2 border-dashed border-amber-500 pointer-events-none z-10"
                                style={{ top: foldPct }}
                            >
                                <span className="absolute right-1 -top-4 text-[9px] font-bold bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded shadow">Fold line</span>
                            </div>
                        )}
                        {overlay && (
                            <>
                                <div
                                    className={`absolute border-2 rounded-lg pointer-events-none z-20 ${passed ? 'border-emerald-500 bg-emerald-500/20' : 'border-red-500 bg-red-500/25'}`}
                                    style={{
                                        top: overlay.top,
                                        left: overlay.left || '2%',
                                        width: overlay.width || 'calc(100% - 1rem)',
                                        height: overlay.height || '15%',
                                    }}
                                />
                                <div
                                    className="absolute pointer-events-none z-30 flex flex-col items-center"
                                    style={{
                                        top: `calc(${overlay.top} - 28px)`,
                                        left: overlay.left || '8%',
                                    }}
                                >
                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded shadow bg-white whitespace-nowrap ${passed ? 'text-emerald-700' : 'text-red-700'}`}>
                                        {highlightLabel}
                                    </span>
                                    <svg width="16" height="20" viewBox="0 0 16 20" className={passed ? 'text-emerald-600' : 'text-red-600'}>
                                        <path fill="currentColor" d="M8 20 L0 6 L6 6 L6 0 L10 0 L10 6 L16 6 Z" />
                                    </svg>
                                </div>
                            </>
                        )}
                    </div>
                    {(metrics.distance_from_viewport_px > 0 || metrics.packshot != null) && (
                        <div className="px-2 py-1.5 bg-white border-t border-slate-100 text-[10px] text-slate-600 flex flex-wrap gap-x-3 gap-y-0.5">
                            {metrics.distance_from_viewport_px > 0 && (
                                <span><strong>{metrics.distance_from_viewport_px}px</strong> below fold</span>
                            )}
                            {metrics.packshot != null && (
                                <span>Packshot: <strong>{metrics.packshot}</strong> · Lifestyle: <strong>{metrics.lifestyle}</strong></span>
                            )}
                        </div>
                    )}
                    <p className="text-[10px] text-slate-500 px-2 py-1.5 bg-white border-t border-slate-100 truncate">{url.replace(/^https?:\/\//, '')}</p>
                </div>
            );
        }

        function SitePreviewFrame({ url, name, scrapeOk, highlightYou }) {
            const [useIframe, setUseIframe] = useState(false);
            const preview = sitePreviewUrl(url);
            const failed = scrapeOk === false;
            if (!url) {
                return <div className="h-full flex items-center justify-center text-slate-400 text-xs">No URL</div>;
            }
            const inner = (useIframe || !preview) ? (
                <iframe title={name || 'Site preview'} src={url} className="w-[400%] h-[400%] origin-top-left scale-[0.25] pointer-events-none border-0 bg-white" sandbox="allow-scripts allow-same-origin" />
            ) : (
                <img src={preview} alt={name || 'Site preview'} className="w-full h-full object-cover object-top bg-slate-100" loading="lazy" onError={() => setUseIframe(true)} />
            );
            return (
                <div className="relative w-full h-full">
                    {inner}
                    {highlightYou && (
                        <div className="absolute inset-2 border-2 border-indigo-500 rounded-lg pointer-events-none">
                            <span className="absolute top-1 left-1 text-[9px] font-bold bg-indigo-600 text-white px-1.5 py-0.5 rounded">Your page</span>
                        </div>
                    )}

        function extractDomain(url) {
            try {
                return new URL(url.startsWith('http') ? url : `https://${url}`).hostname.replace(/^www\./, '');
            } catch {
                return url || 'website';
            }
        }

        function detectPageTypeFromUrl(url) {
            if (!url?.trim()) return null;
            try {
                const u = new URL(url.startsWith('http') ? url : `https://${url}`);
                const path = (u.pathname || '/').replace(/\/$/, '') || '/';
                if (path === '/') return 'homepage';
                const low = path.toLowerCase();
                if (['/product', '/products/', '/p/', '/dp/', '/item/', '/buy', '/shop/'].some(m => low.includes(m))) return 'product';
                const segments = path.split('/').filter(Boolean);
                return segments.length <= 1 ? 'homepage' : 'product';
            } catch {
                return null;
            }
        }

            const detected = detectPageTypeFromUrl(url);
            if (!detected) return 'We will auto-detect homepage vs product page from your URL.';
            return detected === 'homepage'
                ? 'Auto-detected as homepage — competitors will use their homepages too.'

            if (!iso) return '';
            const diff = Date.now() - new Date(iso).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return `${mins} min ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs} hour${hrs > 1 ? 's' : ''} ago`;
            const days = Math.floor(hrs / 24);
            if (days < 7) return `${days} day${days > 1 ? 's' : ''} ago`;
            return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function AnimatedNumber({ value, duration = 700 }) {
            const [display, setDisplay] = useState(value);
            const prevRef = useRef(value);
            useEffect(() => {
                if (value === '--' || value == null || value === '') { setDisplay('--'); return; }
                const target = Number(value);
                if (Number.isNaN(target)) { setDisplay(value); return; }
                const start = Number(prevRef.current);
                const from = Number.isNaN(start) || prevRef.current === '--' ? 0 : start;
                const t0 = performance.now();
                const tick = (now) => {
                    const p = Math.min(1, (now - t0) / duration);
                    const eased = 1 - Math.pow(1 - p, 3);
                    setDisplay(Math.round(from + (target - from) * eased));
                    if (p < 1) requestAnimationFrame(tick);
                    else prevRef.current = target;
                };
                requestAnimationFrame(tick);
            }, [value, duration]);
            return <span>{display}</span>;
        }

        // ── Bootstrap: auth then render ──────────────────────────────────────────
        async function bootstrap() {
            let needsSignIn = false;
            let authUser = null;
            let authProvider = 'none';
            let authError = null;
            let config = null;

            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                sessionStorage.setItem('auth_token', urlToken);
            }
            if (params.get('auth_error')) {
                authError = params.get('auth_error');
            }
            if (urlToken || params.get('auth_error') || params.get('auth_success')) {
                window.history.replaceState({}, '', window.location.pathname);
            }

            try {
                const resp = await fetch('/api/v1/config');
                if (resp.ok) {
                    config = await resp.json();
                }
                if (!config) {
                    const fb = await fetch('/config.json');
                    if (fb.ok) config = await fb.json();
                }

                if (!config) {
                    needsSignIn = true;
                    authProvider = 'none';
                    authError = 'api_unreachable';
                } else {
                    authProvider = config.auth_provider || 'none';
                    _authProvider = authProvider;

                    const token = getAuthToken();

                    if (authProvider === 'google') {
                        if (!token) {
                            needsSignIn = true;
                        } else {
                            authUser = await loadGoogleAuthUser(token);
                            if (!authUser) {
                                sessionStorage.removeItem('auth_token');
                                needsSignIn = true;
                            }
                        }
                    } else if (authProvider === 'clerk') {
                        const pk = config.clerk_publishable_key || '';
                        if (pk && window.Clerk) {
                            _clerk = new window.Clerk(pk);
                            await _clerk.load();
                            if (!_clerk.user) {
                                needsSignIn = true;
                            } else {
                                authUser = _clerk.user;
                            }
                        } else {
                            needsSignIn = true;
                        }
                    } else if (!config.auth_required && isLocalDevHost()) {
                        authUser = { fullName: 'Dev User', firstName: 'Dev', primaryEmailAddress: { emailAddress: 'dev@localhost' } };
                    } else {
                        needsSignIn = true;
                    }
                }
            } catch (e) {
                console.warn('Auth init failed:', e);
                needsSignIn = true;
                authProvider = 'none';
                authError = 'api_unreachable';
            }

            ReactDOM.createRoot(document.getElementById('root')).render(
                <App
                    needsSignIn={needsSignIn}
                    authUser={authUser}
                    authProvider={authProvider}
                    authError={authError}
                />
            );
        }

        bootstrap();
